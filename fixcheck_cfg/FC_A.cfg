# Canonical UMi single-cell experiment - MATLAB L2SM stack, final OLLA setting
# Stack: L2SM tables + RBIR ESM + realized-ESINR feedback + tput-max MCS selection
# (flags at end of file). OLLA offset ceiling 8 dB per 2026-07-10 deterministic
# 3-drop sweep: +17.4 percent vs ceiling 3 dB, first-tx layer BLER ~0.11.
# See doc/BLER_Table_Comparison.md final section.
# Requires matlab_l2sm_bler.dat + rbir_esm.dat (MathWorks-derived, NOT in git;
# generate with export_matlab_bler.m / export_rbir_esm.m).
_seed                333333
num_threads          40
num_drops            1
run_times            200
num_user_per_sector  20
simple_num_BS        7
single_cell_mode     1

Scheduling_Type      1
Calibration_mode     0
TDD_mode             0
USE_POWER_ITERATION      0
POWER_ITERATION_MAX_ITER 5
USE_RAY_LEVEL_DOPPLER    1
USE_PRECODING_BASED_SINR 1
INTERCELL_INTERFERENCE_MARGIN_DB 0.0
use_min_sinr_for_mcs 1

olla_enable          1
olla_window_size     50
olla_target_bler     0.1
olla_bler_margin     0.05
olla_step_down       0.8
olla_step_up         0.2
olla_init_offset     -2.0
olla_min_offset      -10.0
olla_max_offset      8.0

mumimo_scheduling_algorithm  1
chordal_alpha                0.22
epsilon                      0.5

collect_singular_values      0

Codebook_Type              3
Type2_Rank                 4
eType2_ParamComb           3
Rank_Adaptive              1
SU_Fallback                0
Use_SIC                    2
Type2_PhaseAlphabet       16

num_rb               275
fft_size             4096
subcarrier_spacing   60000
numerology           2
bandwidth            200000000
carrier_freq         7000000000

BS_num_of_ant_elements_with_same_pol_each_col(M)          16
BS_num_of_ant_elements_columns(N)                         32
BS_antenna_polarization(P)                                2
BS_num_of_panels_in_a_column(Mg)                          1
BS_num_of_panels_in_a_row(Ng)                             1

BS_Mp                                                     4
BS_Np                                                     16

BS_dH                                                     0.5
BS_dV                                                     0.5

BS_dgH                                                    0
BS_dgV                                                    0

MS_num_of_ant_elements_with_same_pol_each_col(M)          8
MS_num_of_ant_elements_columns(N)                         1
MS_antenna_polarization(P)                                1
MS_num_of_panels_in_a_column(Mg)                          1
MS_num_of_panels_in_a_row(Ng)                             1

MS_Mp    8
MS_Np    1

MS_dH    0.5
MS_dV    0.5
MS_dgH   0
MS_dgV   0

handheld_mode        1
handheld_beta        45
handheld_num_ports   8
handheld_port_1      1
handheld_port_2      7
handheld_port_3      3
handheld_port_4      5
ue_antenna_element_gain  0

Mechanic_tilt       105
BS_Tx_Power         54
UT_Noise_Figure     9

num_compute_coef    1
num_neighbor        4
grid_interval       2000

cqi_history_length 10
mx_ue_mumimo       12
NUM_UE_Layer       2

N_pf                100
SCHEDULE_DELAY      5

test_environment      Dense_Urban_eMBB_C_Micro
pathloss_model        UMi_B

file_name          ./FC_A/x_
per_layer_mcs        1
harq_ir              1
matlab_bler          1
matlab_esinr_fb      1
matlab_tput_mcs      1
