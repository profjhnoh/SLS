# ============================================================
# 3GPP 38.901 Table 7.8-2A: Full Calibration (Additional)
# Scenario : UMa  |  BS Config 3  |  UT Config B  |  7 GHz
# Calibration metrics: 1) Coupling loss  2) Wideband SIR
#                      3) DS/ASD/ZSD/ASA/ZSA CDFs  4) PRB SVD CDFs
# ============================================================
#
# Table 7.8-2A parameters applied.
# Unspecified parameters follow Table 7.8-2 → Table 7.8-1.
#
# BS Config 3: M=8, N=16, P=2, Mg=Ng=1, Mp=8, Np=16
#   → Each antenna element → 1 port (256 total = 8×16×2)
#   → Polarized antenna: Model-2 (Clause 7.3.2)
#
# UT Config B (Handheld): 4 ports, single polarization
#   → Positions (1, 7, 3, 5) on 15cm×7cm device
#   → Directional element pattern: Table 7.3-2 (G_max=5.3 dBi)
#   → 2-stage rotation: per-antenna → UT LCS → GCS
#
# UT orientation: alpha~U[0,360], beta=45, gamma=0
# BS downtilt: 102° (Table 7.8-1 for UMa)
# BS Tx Power: 49 dBm (UMa)
# UT Noise Figure: 9 dB
# O2I Penetration: 50% low + 50% high (UMa_B)
# UT attachment: RSRP (formula) from BS port 0
# SCS: 30 kHz (Table 7.8-2A)
# Wrapping: geographical distance based (mandatory)
#
# ============================================================

# --- Simulation Control ---
_seed                333333
num_threads          100
num_drops            5
run_times            1000
num_user_per_sector  10
simple_num_BS        19       # 7~19 cell RSRP search
single_cell_mode     0

# --- Mode Settings ---
Scheduling_Type      1        # 1 = MU MIMO
Calibration_mode     1        # 1 = Calibration mode
TDD_mode             1        # 1 = TDD reciprocity-based precoding
USE_POWER_ITERATION      0
POWER_ITERATION_MAX_ITER 5
USE_RAY_LEVEL_DOPPLER    1
USE_PRECODING_BASED_SINR 1
INTERCELL_INTERFERENCE_MARGIN_DB 0.0  # Handover margin 0 dB (Table 7.8-1)
use_min_sinr_for_mcs 1

# --- OLLA (disabled for calibration) ---
olla_enable          0
olla_window_size     50
olla_target_bler     0.1
olla_bler_margin     0.05
olla_step_down       0.8
olla_step_up         0.2
olla_init_offset     -2.0
olla_min_offset      -10.0
olla_max_offset      3.0

# --- MU-MIMO Scheduling ---
mumimo_scheduling_algorithm  1       # 1 = Chordal Distance
chordal_alpha                0.22
epsilon                      0.5

# --- Singular Value CDF Collection ---
collect_singular_values      1       # Enabled for metric 4)

# --- OFDM & Carrier (Table 7.8-2A: 7 GHz, 20 MHz, 30 kHz SCS) ---
num_rb               51
fft_size             1024
subcarrier_spacing   30000
numerology           1               # 30 kHz SCS
bandwidth            20000000        # 20 MHz
carrier_freq         7000000000      # 7 GHz

# --- BS Antenna Configuration (Table 7.8-2A Config 3) ---
# M=8, N=16, P=2, Mg=1, Ng=1, dH=dV=0.5λ
# Port mapping: Mp=8, Np=16 (each element → 1 port)
BS_num_of_ant_elements_with_same_pol_each_col(M)          8
BS_num_of_ant_elements_columns(N)                         16
BS_antenna_polarization(P)                                2
BS_num_of_panels_in_a_column(Mg)                          1
BS_num_of_panels_in_a_row(Ng)                             1

BS_Mp                                                     8
BS_Np                                                     16

BS_dH                                                     0.5
BS_dV                                                     0.5

BS_dgH                                                    0
BS_dgV                                                    0

# --- UT Antenna Configuration (Handheld Config B) ---
# 4 ports (at positions 1,7,3,5), single polarization
# MS_M=4 ports, MS_N=1, MS_P=1, Ms_Mp=4, MS_Np=1
# (d_rx positions set by handheld code, not regular grid)
MS_num_of_ant_elements_with_same_pol_each_col(M)          4
MS_num_of_ant_elements_columns(N)                         1
MS_antenna_polarization(P)                                1
MS_num_of_panels_in_a_column(Mg)                          1
MS_num_of_panels_in_a_row(Ng)                             1

MS_Mp    4
MS_Np    1

MS_dH    0.5
MS_dV    0.5
MS_dgH   0
MS_dgV   0

# --- Handheld UT Antenna Model (Table 7.8-2A Config B) ---
handheld_mode        1
handheld_beta        45        # UT β = 45° (Table 7.8-2A)
handheld_num_ports   4         # 4 antenna ports
handheld_port_1      1         # Position indices (1-based, Clause 7.3)
handheld_port_2      7
handheld_port_3      3
handheld_port_4      5

# --- BS Antenna Downtilt (Table 7.8-1 / 7.8-2A: UMa) ---
Mechanic_tilt       0       # 102° from zenith for UMa

# --- BS Tx Power & UT Noise Figure (Table 7.8-1 / 7.8-2A) ---
BS_Tx_Power         49        # BS Transmit Power [dBm] for UMa
UT_Noise_Figure     9         # UT Noise Figure [dB]

# --- Channel & Scheduling ---
num_compute_coef    1
num_neighbor        4
grid_interval       10

cqi_history_length  10
mx_ue_mumimo        4
NUM_UE_Layer        2

N_pf                100
SCHEDULE_DELAY      5

# --- Scenario & Channel Model ---
test_environment      Dense_Urban_eMBB_A
pathloss_model        UMa_B

channel_param_legacy 0

# --- Output ---
file_name          ./FullCal_UMa_Config3_7GHz/UMa_Config3_7GHz_