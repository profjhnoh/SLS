_seed                333333
num_threads          40      # number of threads for openmp
num_drops            3
run_times            500
num_user_per_sector  20
simple_num_BS        7        # 7~19 cell RSRP search, Not consider when indoor scenario
single_cell_mode     1        # *** 1 = Center cell only, 0 = All cells ***

Scheduling_Type      1        # 2 = mTRP(NCJT), 1 = MU MIMO, 0 = roundrobin
Calibration_mode     0        # 1= Calibration mode, 0 = Full simulation
TDD_mode             1        # 1 = TDD reciprocity-based precoding, 0 = FDD codebook-based precoding
USE_POWER_ITERATION      0    # 0 = SelfAdjointEigenSolver (accurate, default), 1 = Power Iteration (faster)
POWER_ITERATION_MAX_ITER 5    # Number of iterations for Power Iteration (3-10 recommended, only used if USE_POWER_ITERATION=1)
USE_RAY_LEVEL_DOPPLER    1    # 0 = Cluster-average Doppler (fast, default), 1 = Ray-level precision (accurate, slower)
USE_PRECODING_BASED_SINR 1    # 0 = Use feedback CQI (default), 1 = Calculate SINR from actual precoding matrix
INTERCELL_INTERFERENCE_MARGIN_DB 0.0  # Inter-cell interference margin in dB (0 = perfect knowledge, for future margin modeling)

use_min_sinr_for_mcs 1

# OLLA (Outer Loop Link Adaptation) - dynamically adjusts MCS based on moving window BLER
olla_enable          0       # 0 = disable, 1 = enable
olla_window_size     50      # Moving window size for BLER measurement
olla_target_bler     0.1     # Target BLER (0.1 = 10%)
olla_bler_margin     0.05    # BLER margin for hysteresis (no adjustment if |measured - target| < margin)
olla_step_down       0.8    # SINR offset decrease when BLER too high (dB)
olla_step_up         0.2    # SINR offset increase when BLER too low (dB)
olla_init_offset     -2.0    # Initial OLLA offset (dB) - start conservatively for faster convergence
olla_min_offset      -10.0   # Minimum OLLA offset (dB)
olla_max_offset      3.0     # Maximum OLLA offset (dB)

# MU-MIMO Scheduling Algorithm Selection
mumimo_scheduling_algorithm  1       # 0 = SUS (default), 1 = Chordal Distance
chordal_alpha                0.22    # Weight factor for Chordal Distance (M=6,N=2: 0.22, M=4,N=2: 0.4)
epsilon                      0.5     # Semi-orthogonality threshold for SUS (typical: 0.3~0.7)

# Singular Value CDF Collection (for channel analysis)
collect_singular_values      0       # 0 = disable, 1 = enable (outputs SV_1_cdf.dat, SV_2_cdf.dat, ...)

num_rb               50
fft_size             1024 
subcarrier_spacing   30000
numerology           1               #15khz : 0, 30khz :1, 60khz : 2, 120khz : 3, 240khz : 4, 480khz : 5, , 960khz : 6
bandwidth            20000000                #2500000000
carrier_freq         7000000000

BS_num_of_ant_elements_with_same_pol_each_col(M)          16  #24
BS_num_of_ant_elements_columns(N)                         16  #32
BS_antenna_polarization(P)                                2   #2
BS_num_of_panels_in_a_column(Mg)                          1
BS_num_of_panels_in_a_row(Ng)                             1          

BS_Mp                                                     4
BS_Np                                                     16

BS_dH                                                     0.5
BS_dV                                                     0.5

BS_dgH                                                    4
BS_dgV                                                    2

MS_num_of_ant_elements_with_same_pol_each_col(M)          2          #DU_B=2
MS_num_of_ant_elements_columns(N)                         1          #DU_B=4
MS_antenna_polarization(P)                                2          #DU_B=2
MS_num_of_panels_in_a_column(Mg)                          1          #DU_B=1
MS_num_of_panels_in_a_row(Ng)                             1          #DU_B=1

MS_Mp    2
MS_Np    1

MS_dH    0.5
MS_dV    0.5
MS_dgH   0
MS_dgV   0

Mechanic_tilt       90

num_compute_coef    1
num_neighbor        4
grid_interval       2000

cqi_history_length 10
mx_ue_mumimo       5
NUM_UE_Layer       2

N_pf                100
SCHEDULE_DELAY      5

# BS_Tx_Power         46        # BS Transmit Power [dBm] (overrides scenario default if specified)
# UT_Noise_Figure     7         # UT Noise Figure [dB] (overrides scenario default if specified)

test_environment      Dense_Urban_eMBB_A   #InH_eMBB_C, InH_eMBB_A, InH_eMBB_B, InH_eMBB_C,Dense_Urban_eMBB_A, Dense_Urban_eMBB_B, Dense_Urban_eMBB_C_Macro, Dense_Urban_eMBB_C_Micro, Rural_eMBB_A, Rural_eMBB_B, Rural_eMBB_C
pathloss_model        UMa_B                #InH_A,InH_B,UMa_A,UMa_B,UMi_A,UMi_B,RMa_A,RMa_B, InH_ETRI, UMi_ETRI

file_name          ./RB_ii/x_
row_beam_enable 1
row_beam_az_mode 0
row_beam_zenith_min_deg 60
row_beam_zenith_max_deg 120
row_beam_num_zenith 4
