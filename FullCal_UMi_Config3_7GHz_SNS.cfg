# ============================================================
# 3GPP 38.901 Table 7.8-6B: BS-side SNS Calibration
# Scenario : UMi-Street Canyon  |  Config 3  |  7 GHz
# SNS ENABLED — j20 Stochastic VR Model (Case 2)
# ============================================================
#
# Table 7.6.14.1.2-1/2/3 UMi parameters.
# Compare with FullCal_UMi_Config3_7GHz_baseline.cfg (SNS disabled).
# Metrics: 1) Coupling loss CDF  2) SV ratio CDF (SV_2/SV_1, SV_3/SV_1, SV_4/SV_1)
#
# ============================================================

# --- Simulation Control ---
_seed                777777
num_threads          100
num_drops            10
run_times            1000
num_user_per_sector  10
simple_num_BS        7
single_cell_mode     0

# --- Mode Settings ---
Scheduling_Type      1
Calibration_mode     1
TDD_mode             1
USE_RAY_LEVEL_DOPPLER    1
USE_PRECODING_BASED_SINR 1
use_min_sinr_for_mcs 1

# --- OLLA (disabled for calibration) ---
olla_enable          0

# --- MU-MIMO Scheduling ---
mumimo_scheduling_algorithm  1
chordal_alpha                0.22
epsilon                      0.5

# --- Diagnostic ---
collect_singular_values      1
dump_cluster_params          1

# --- OFDM & Carrier (7 GHz, 20 MHz, 30 kHz SCS) ---
num_rb               51
fft_size             1024
subcarrier_spacing   30000
numerology           1
bandwidth            20000000
carrier_freq         7000000000

# --- BS Antenna Configuration (Table 7.8-6B Config 3) ---
# M=24, N=32, P=2, Mg=1, Ng=1, dH=0.5, dV=0.7
# Port mapping: Mp=8, Np=32 (K=3, L=1)
# NUM_TX_Port = 2*8*32 = 512
BS_num_of_ant_elements_with_same_pol_each_col(M)    24
BS_num_of_ant_elements_columns(N)                    32
BS_antenna_polarization(P)                           2
BS_num_of_panels_in_a_column(Mg)                     1
BS_num_of_panels_in_a_row(Ng)                        1
BS_Mp    8
BS_Np    32
BS_dH    0.5
BS_dV    0.7
BS_dgH   0
BS_dgV   0

# --- UT Antenna Configuration (Handheld Config B) ---
# 4 ports (positions 1,7,3,5), beta=45, isotropic element
MS_num_of_ant_elements_with_same_pol_each_col(M)     4
MS_num_of_ant_elements_columns(N)                     1
MS_antenna_polarization(P)                            1
MS_num_of_panels_in_a_column(Mg)                      1
MS_num_of_panels_in_a_row(Ng)                         1
MS_Mp    4
MS_Np    1
MS_dH    0.5
MS_dV    0.5
MS_dgH   0
MS_dgV   0

# --- Handheld UT Antenna Model ---
handheld_mode         1
handheld_beta         45
handheld_num_ports    4
handheld_port_1       1
handheld_port_2       7
handheld_port_3       3
handheld_port_4       5
ue_antenna_element_gain  0    # Isotropic (Table 7.8-6B)

# --- BS Antenna Downtilt ---
Mechanic_tilt        102

# --- Channel & Scheduling ---
num_compute_coef     1
num_neighbor         4
grid_interval        2000
cqi_history_length   10
mx_ue_mumimo         4
NUM_UE_Layer         2
N_pf                 100
SCHEDULE_DELAY       5

# --- Power ---
BS_Tx_Power          44
UT_Noise_Figure      9

# --- Channel param version ---
channel_param_legacy  0

# --- BS-side SNS: Stochastic VR Model (j20 Case 2) ---
# Table 7.6.14.1.2-1~3 UMi values
sns_bs_enabled        1
sns_mu_P_vis          0.49
sns_sigma_P_vis       0.18
sns_vr_A              0.12
sns_vr_B              0.48
sns_vr_R              50.0
sns_vr_delta          0.001
sns_rolloff_C         13.0

# --- Scenario & Channel Model ---
test_environment      Dense_Urban_eMBB_C_Micro
pathloss_model        UMi_B

# --- Output ---
file_name   ./FullCal_UMi_Config3_7GHz_SNS/UMi_Config3_7GHz_SNS_
