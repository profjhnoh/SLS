# ============================================================
# 3GPP 38.901 Section 7.8.2 Full Calibration
# Scenario : UMa  |  Config2  |  6 GHz
# Calibration metrics: 1) Coupling loss  2) Wideband SIR  4) PRB singular value CDFs
# ============================================================
#
# Table 7.8-2 parameters applied.
# Unspecified parameters follow Table 7.8-1.
#
# BS Tx Power required: 49 dBm  (hardcoded in Initiallization.cpp)
# UT Noise Figure required: 9 dB        (hardcoded in Initiallization.cpp)
# O2I Penetration: 50% low + 50% high   (pathloss_model _B = Channel_Model_Type 1)
# Handover margin: 0 dB
# BS port mapping: each element -> 1 CRS port
# UT attachment: Based on RSRP (formula) from CRS port 0
# UT orientation: alpha~U[0,360], beta=90, gamma=0
# UT antenna pattern: Isotropic
# Polarized antenna modelling: Model-2 (TR36.873)
# Wrapping: geographical distance based (mandatory)
#
# ============================================================

# --- Simulation Control ---
_seed                333333
num_threads          100
num_drops            5
run_times            1000
num_user_per_sector  10
simple_num_BS        19       # 7~19 cell RSRP search
single_cell_mode     0

# --- Mode Settings ---
Scheduling_Type      1        # 1 = MU MIMO
Calibration_mode     1        # 1 = Calibration mode
TDD_mode             1        # 1 = TDD reciprocity-based precoding
USE_POWER_ITERATION      0
POWER_ITERATION_MAX_ITER 5
USE_RAY_LEVEL_DOPPLER    1
USE_PRECODING_BASED_SINR 1
INTERCELL_INTERFERENCE_MARGIN_DB 0.0  # Handover margin 0 dB (Table 7.8-1)
use_min_sinr_for_mcs 1

# --- OLLA (disabled for calibration) ---
olla_enable          0
olla_window_size     50
olla_target_bler     0.1
olla_bler_margin     0.05
olla_step_down       0.8
olla_step_up         0.2
olla_init_offset     -2.0
olla_min_offset      -10.0
olla_max_offset      3.0

# --- MU-MIMO Scheduling ---
mumimo_scheduling_algorithm  1       # 1 = Chordal Distance
chordal_alpha                0.22
epsilon                      0.5

# --- Singular Value CDF Collection ---
collect_singular_values      1       # Enabled for metric 4)

# --- OFDM & Carrier (Table 7.8-2) ---
num_rb               51
fft_size             1024
subcarrier_spacing   30000
numerology           1               # 30kHz SCS
bandwidth            20000000          # 20 MHz
carrier_freq         6000000000          # 6 GHz

# --- BS Antenna Configuration (Table 7.8-2: M=2,N=2,P=1,Mg=1,Ng=1  (metrics 1,2,4: CL, SIR, PRB SVD)) ---
BS_num_of_ant_elements_with_same_pol_each_col(M)          2
BS_num_of_ant_elements_columns(N)                         2
BS_antenna_polarization(P)                                1
BS_num_of_panels_in_a_column(Mg)                          1
BS_num_of_panels_in_a_row(Ng)                             1

BS_Mp                                                     2
BS_Np                                                     2

BS_dH                                                     0.5
BS_dV                                                     0.5

BS_dgH                                                    0
BS_dgV                                                    0

# --- UT Antenna Configuration (Table 7.8-2: Mg=Ng=1, M=N=1, P=2) ---
MS_num_of_ant_elements_with_same_pol_each_col(M)          1
MS_num_of_ant_elements_columns(N)                         1
MS_antenna_polarization(P)                                2
MS_num_of_panels_in_a_column(Mg)                          1
MS_num_of_panels_in_a_row(Ng)                             1

MS_Mp    1
MS_Np    1

MS_dH    0.5
MS_dV    0.5
MS_dgH   0
MS_dgV   0

# --- BS Antenna Downtilt (Table 7.8-1) ---
Mechanic_tilt       0       # 102 deg from zenith for UMa

# --- Channel & Scheduling ---
num_compute_coef    1
num_neighbor        4
grid_interval       2000

cqi_history_length  10
mx_ue_mumimo        4
NUM_UE_Layer        2

N_pf                100
SCHEDULE_DELAY      5

# --- Scenario & Channel Model ---
test_environment      Dense_Urban_eMBB_A
pathloss_model        UMa_B

channel_param_legacy 0

# --- Output ---
file_name          ./FullCal_UMa_Config2_6GHz/UMa_Config2_6GHz_
