# ============================================================
# 3GPP 38.901 Section 7.6.14.1.3 BS-side Spatial Non-Stationarity
# Scenario : UMa  |  Config1  |  6 GHz  |  SNS enabled
# Based on FullCal_UMa_Config1_6GHz.cfg with large array + SNS
# ============================================================

# --- Simulation Control ---
_seed                11111
num_threads          100
num_drops            10
run_times            1000
num_user_per_sector  20
simple_num_BS        19
single_cell_mode     0

# --- Mode Settings ---
Scheduling_Type      1
Calibration_mode     1
TDD_mode             1
USE_POWER_ITERATION      0
POWER_ITERATION_MAX_ITER 5
USE_RAY_LEVEL_DOPPLER    1
USE_PRECODING_BASED_SINR 1
INTERCELL_INTERFERENCE_MARGIN_DB 0.0
use_min_sinr_for_mcs 1

# --- OLLA (disabled for calibration) ---
olla_enable          0

# --- MU-MIMO Scheduling ---
mumimo_scheduling_algorithm  1
chordal_alpha                0.22
epsilon                      0.5

# --- Diagnostic ---
collect_singular_values      1
dump_cluster_params          1

# --- OFDM & Carrier ---
num_rb               51
fft_size             1024
subcarrier_spacing   30000
numerology           1
bandwidth            20000000
carrier_freq         6000000000

# --- BS Antenna Configuration (8×16×2, large array for SNS visibility) ---
BS_num_of_ant_elements_with_same_pol_each_col(M)          8
BS_num_of_ant_elements_columns(N)                         16
BS_antenna_polarization(P)                                2
BS_num_of_panels_in_a_column(Mg)                          1
BS_num_of_panels_in_a_row(Ng)                             1

BS_Mp                                                     1
BS_Np                                                     1

BS_dH                                                     0.5
BS_dV                                                     0.5

BS_dgH                                                    0
BS_dgV                                                    0

# --- UT Antenna Configuration ---
MS_num_of_ant_elements_with_same_pol_each_col(M)          1
MS_num_of_ant_elements_columns(N)                         1
MS_antenna_polarization(P)                                2
MS_num_of_panels_in_a_column(Mg)                          1
MS_num_of_panels_in_a_row(Ng)                             1

MS_Mp    1
MS_Np    1

MS_dH    0.5
MS_dV    0.5
MS_dgH   0
MS_dgV   0

# --- BS Antenna Downtilt ---
Mechanic_tilt       102

# --- Channel & Scheduling ---
num_compute_coef    1
num_neighbor        4
grid_interval       10

cqi_history_length  10
mx_ue_mumimo        4
NUM_UE_Layer        2

N_pf                100
SCHEDULE_DELAY      5

BS_Tx_Power         49
UT_Noise_Figure     9

# --- BS-side Spatial Non-Stationarity (3GPP TR 38.901 Section 7.6.14.1.3) ---
sns_bs_enabled      1
sns_mu_P_vis        0.0
sns_sigma_P_vis     1.0
sns_vr_A            0.3
sns_vr_B            2.0
sns_vr_R            1.5
sns_vr_delta        0.1
sns_rolloff_C       3.0

# --- Scenario & Channel Model ---
test_environment      Dense_Urban_eMBB_C_Micro
pathloss_model        UMi_B

channel_param_legacy  0

# --- Output ---
file_name          ./SNSCal_UMi_Case2_Config1/UMi_Case2_Config1_SNS_
